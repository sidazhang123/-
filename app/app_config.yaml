log_keep:
  # 单个筛选任务保留的 task_logs 最大条数。
  # 超过上限后自动清理最旧日志。
  # 约束：>= 1
  task_per_task: 2000

  # 维护日志保留最近 N 个任务的全量日志（不按单任务条数截断）。
  # 约束：>= 1
  maintenance_jobs: 2

  # 概念更新日志保留最近 N 个任务的全量日志。
  # 约束：>= 1
  concept_jobs: 4

app:
  # 服务启动时是否预热 zsdtdx 并行抓取器进程池。
  # true: 启动阶段执行预热；false: 跳过预热，首次真实抓取时再按需拉起。
  startup_prewarm_parallel_fetcher_enabled: false

  # 应用优雅停机等待时间（秒）。
  # 约束：>= 1
  shutdown_grace_seconds: 15