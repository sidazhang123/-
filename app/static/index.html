<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>任务监控 - 量价筛选系统</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260322-monitor-param-panel-h" />
</head>
<body>
  <div class="app-shell">
    <!-- ── Top Navigation ── -->
    <nav class="topnav">
      <div class="topnav-inner">
        <a href="/" class="topnav-brand">
          <div class="brand-icon">量</div>
          <span>量价筛选</span>
        </a>
        <ul class="topnav-links">
          <li><a href="/" class="active"><i data-lucide="activity" class="nav-icon"></i><span>任务监控</span></a></li>
          <li><a href="/maintenance"><i data-lucide="database" class="nav-icon"></i><span>数据维护</span></a></li>
          <li><a href="/results"><i data-lucide="bar-chart-3" class="nav-icon"></i><span>筛选结果</span></a></li>
          <li><a href="/task-manager"><i data-lucide="trash-2" class="nav-icon"></i><span>任务管理</span></a></li>
        </ul>
      </div>
    </nav>

    <!-- ── Mobile bottom nav ── -->
    <nav class="mobile-nav">
      <a href="/" class="active"><i data-lucide="activity" class="nav-icon"></i>监控</a>
      <a href="/maintenance"><i data-lucide="database" class="nav-icon"></i>维护</a>
      <a href="/results"><i data-lucide="bar-chart-3" class="nav-icon"></i>结果</a>
      <a href="/task-manager"><i data-lucide="trash-2" class="nav-icon"></i>管理</a>
    </nav>

    <!-- ── Main ── -->
    <div class="main-content page-monitor">
      <div class="page-header">
        <h1>策略任务监控台</h1>
        <p>创建筛选任务，实时查看任务进度与日志。</p>
      </div>

    <section class="panel">
      <h2>任务参数</h2>
      <div class="grid-two">
        <label>
          源数据库路径
          <input id="sourceDb" type="text" value="D:\\quant.duckdb" />
        </label>
        <label>
          股票列表（代码或中文名，逗号/空格/换行分隔；留空=全市场）
          <textarea id="stocksInput" rows="1" placeholder="sh.600000&#10;浦发银行"></textarea>
        </label>
      </div>

      <div class="grid-two">
        <label>
          策略组
          <select id="strategyGroupSelect"></select>
        </label>
      </div>

      <div id="strategyGroupDesc" class="hint">-</div>

      <div>
        <div class="param-panel-title">组级参数</div>
        <div id="groupParamsForm" class="param-panel"></div>
      </div>

      <div id="settingsSaveHint" class="hint">参数修改后请点“保存参数设置”。</div>

      <div class="btn-row monitor-action-row">
        <div class="monitor-switch-row">
          <span class="monitor-switch-label">跳过数据完整性过滤</span>
          <label class="rocker-switch" for="skipCoverageFilter">
            <input type="checkbox" id="skipCoverageFilter" checked />
            <span class="rocker-switch-body" aria-hidden="true">
              <span class="rocker-switch-face rocker-switch-face-yes">是</span>
              <span class="rocker-switch-face rocker-switch-face-no">否</span>
            </span>
          </label>
        </div>
        <div class="button-cluster">
          <button id="saveFormSettingsBtn" type="button" class="ghost">保存参数设置</button>
          <button id="createTaskFullBtn">启动筛选任务（全量）</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>任务状态</h2>
      <div class="task-toolbar">
        <label class="field-grow">
          历史任务
          <select id="taskSelect"></select>
        </label>
        <span id="monitorStreamState" class="stream-state is-idle">SSE: 未连接</span>
        <div class="button-cluster">
          <button id="refreshTasksBtn">刷新任务列表</button>
          <button id="pauseResumeBtn" disabled>暂停任务</button>
          <button id="stopTaskBtn" disabled class="danger">停止任务</button>
        </div>
      </div>

      <div id="statusCard" class="status-card">
        <div>状态: <strong id="statusText">-</strong></div>
        <div>任务模式: <strong id="modeText">-</strong></div>
        <div>策略组: <strong id="strategyNameText">-</strong></div>
        <div>策略说明: <strong id="strategyDescText">-</strong></div>
        <div>进度: <strong id="progressText">0%</strong></div>
        <div>股票: <strong id="stocksProgressText">0 / 0</strong></div>
        <div>命中: <strong id="resultCountText">0</strong></div>
        <div>日志: <strong id="logCountText">信息 0 / 错误 0</strong></div>
        <div>当前代码: <strong id="currentCodeText">-</strong></div>
        <div>未识别输入: <strong id="unresolvedText">-</strong></div>
        <div>错误信息: <strong id="fatalErrorText">-</strong></div>
        <div class="progress-bar"><div id="progressBarInner"></div></div>
      </div>
    </section>

    <section class="panel">
      <h2>运行日志</h2>
      <div class="log-tabs">
        <button class="log-tab active" data-log-target="infoPane">信息日志</button>
        <button class="log-tab error-tab" data-log-target="errorPane">错误日志</button>
      </div>
      <div id="infoPane" class="log-tab-pane active">
        <pre id="infoLogs" class="log-box"></pre>
      </div>
      <div id="errorPane" class="log-tab-pane">
        <pre id="errorLogs" class="log-box error"></pre>
      </div>
    </section>
    </div><!-- /.main-content -->
  </div><!-- /.app-shell -->

  <script src="/static/vendor/lucide/lucide.min.js"></script>
  <script src="/static/param-render.js?v=20260322"></script>
  <script src="/static/monitor.js?v=20260322-param-panel"></script>
  <script>lucide.createIcons();</script>
  <script>
    document.querySelectorAll('.log-tabs').forEach(bar => {
      bar.addEventListener('click', e => {
        const btn = e.target.closest('.log-tab');
        if (!btn) return;
        const panel = bar.closest('.panel');
        panel.querySelectorAll('.log-tab').forEach(t => t.classList.remove('active'));
        panel.querySelectorAll('.log-tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.logTarget).classList.add('active');
      });
    });
  </script>
</body>
</html>
