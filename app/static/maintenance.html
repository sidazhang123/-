<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据维护 - 量价筛选系统</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260311-compact-button-groups" />
</head>
<body>
  <div class="app-shell">
    <!-- ── Top Navigation ── -->
    <nav class="topnav">
      <div class="topnav-inner">
        <a href="/" class="topnav-brand">
          <div class="brand-icon">量</div>
          <span>量价筛选</span>
        </a>
        <ul class="topnav-links">
          <li><a href="/"><i data-lucide="activity" class="nav-icon"></i><span>任务监控</span></a></li>
          <li><a href="/maintenance" class="active"><i data-lucide="database" class="nav-icon"></i><span>数据维护</span></a></li>
          <li><a href="/results"><i data-lucide="bar-chart-3" class="nav-icon"></i><span>筛选结果</span></a></li>
        </ul>
      </div>
    </nav>

    <!-- ── Mobile bottom nav ── -->
    <nav class="mobile-nav">
      <a href="/"><i data-lucide="activity" class="nav-icon"></i>监控</a>
      <a href="/maintenance" class="active"><i data-lucide="database" class="nav-icon"></i>维护</a>
      <a href="/results"><i data-lucide="bar-chart-3" class="nav-icon"></i>结果</a>
    </nav>

    <!-- ── Main ── -->
    <div class="main-content page-maintenance">
      <div class="page-header">
        <h1>数据维护</h1>
        <p>管理数据源，启动和监控维护任务。</p>
      </div>

    <section class="panel server-status-panel">
      <h2>TDX 服务器状态</h2>
      <div id="serverStatusContent" class="server-status-grid">
        <span class="server-status-loading">加载中…</span>
      </div>
    </section>

    <section class="panel">
      <h2>维护参数</h2>
      <div class="grid-four">
        <label>
          运行模式
          <select id="maintenanceRunMode">
            <option value="latest_update">最新数据更新</option>
            <option value="historical_backfill">历史数据维护</option>
            <option value="concept">概念更新</option>
          </select>
        </label>
      </div>
      <div class="btn-row">
        <button id="startMaintenanceBtn">启动维护任务</button>
        <span id="maintenanceSettingsHint" class="hint">选择运行模式后启动任务。</span>
      </div>
    </section>

    <section class="panel">
      <h2>维护任务状态</h2>
      <div class="task-toolbar">
        <label class="field-grow">
          <select id="maintenanceJobSelect"></select>
        </label>
        <span id="maintenanceStreamState" class="stream-state is-idle">SSE: 未连接</span>
        <div class="button-cluster">
          <button id="refreshMaintenanceJobsBtn">刷新任务列表</button>
          <button id="stopMaintenanceBtn" class="danger" disabled>停止当前任务</button>
        </div>
      </div>
      <div id="maintenanceStatusCard" class="status-card">
        <div><span id="maintenanceStatusLabel">状态</span>: <strong id="maintenanceStatusText">-</strong></div>
        <div><span id="maintenancePhaseLabel">阶段</span>: <strong id="maintenancePhaseText">-</strong></div>
        <div><span id="maintenancePhaseLabelTitle">阶段说明</span>: <strong id="maintenancePhaseLabelText">-</strong></div>
        <div><span id="maintenanceProgressLabel">进度</span>: <strong id="maintenanceProgressText">0%</strong></div>
        <div><span id="maintenanceStepsLabel">步骤进度</span>: <strong id="maintenanceStepsText">-</strong></div>
        <div><span id="maintenanceTasksLabel">抓取进度</span>: <strong id="maintenanceTasksText">-</strong></div>
        <div><span id="maintenanceRetryLabel">重试轮次</span>: <strong id="maintenanceRetryText">-</strong></div>
        <div><span id="maintenanceRowsLabel">写入统计</span>: <strong id="maintenanceRowsText">-</strong></div>
        <div><span id="maintenanceRemovedRowsLabel">分钟线数量异常</span>: <strong id="maintenanceRemovedRowsText">0</strong></div>
        <div id="fetchProgressSection" class="fetch-progress-section" style="display:none;">
          <div class="fetch-progress-header">拉取写入实时进度</div>
          <div class="fetch-progress-grid">
            <div>轮次: <strong id="fetchRoundText">-</strong></div>
            <div>已处理: <strong id="fetchProcessedText">-</strong></div>
            <div>成功: <strong id="fetchSuccessText">-</strong></div>
            <div>无数据(非交易日): <strong id="fetchNoDataText">-</strong></div>
            <div>失败: <strong id="fetchFailedText">-</strong></div>
            <div>已写入行数: <strong id="fetchRowsAppendedText">-</strong></div>
            <div>累计写入: <strong id="fetchRowsWrittenText">-</strong></div>
          </div>
          <div class="progress-bar"><div id="fetchProgressBar"></div></div>
        </div>
        <div><span id="maintenanceErrorLabel">错误信息</span>: <strong id="maintenanceErrorText">-</strong></div>
        <div class="progress-bar"><div id="maintenanceProgressBar"></div></div>
      </div>
    </section>

    <section class="panel">
      <h2>运行日志</h2>
      <div class="log-tabs">
        <button class="log-tab active" data-log-target="maintInfoPane">信息日志</button>
        <button class="log-tab error-tab" data-log-target="maintErrorPane">错误日志</button>
      </div>
      <div id="maintInfoPane" class="log-tab-pane active">
        <pre id="maintenanceInfoLogs" class="log-box"></pre>
      </div>
      <div id="maintErrorPane" class="log-tab-pane">
        <pre id="maintenanceErrorLogs" class="log-box error"></pre>
      </div>
    </section>
    </div><!-- /.main-content -->
  </div><!-- /.app-shell -->

  <script src="/static/vendor/lucide/lucide.min.js"></script>
  <script src="/static/maintenance.js?v=20260311-error-tab-alert"></script>
  <script>lucide.createIcons();</script>
  <script>
    document.querySelectorAll('.log-tabs').forEach(bar => {
      bar.addEventListener('click', e => {
        const btn = e.target.closest('.log-tab');
        if (!btn) return;
        const panel = bar.closest('.panel');
        panel.querySelectorAll('.log-tab').forEach(t => t.classList.remove('active'));
        panel.querySelectorAll('.log-tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.logTarget).classList.add('active');
      });
    });
  </script>
</body>
</html>
